# Tox (http://tox.testrun.org/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox -c tox-system_tests.ini" from the driver directory. (generated/nifake)
[tox]
envlist = py{310,311,312,313,314}-nifake-wheel_dep,py{310,311,312,313,314}-nifake-system_tests, py314-nifake-coverage
skip_missing_interpreters=True
ignore_basepython_conflict=True
# We put the .tox directory outside of the Jenkins workspace so that it isn't wiped with the rest of the repo
toxworkdir = ../../../.tox

[testenv]
description =
    nifake-wheel_dep: Build the nitclk wheel because we use it in nifake tests
    nifake-system_tests: Run nifake system tests (requires NI-FAKE runtime to be installed)
    nifake-coverage: Prepare coverage report for upload to codecov.io  # upload handled by GitHub Actions

changedir =
    nifake-wheel_dep: ../nitclk
    nifake-system_tests: .
    nifake-coverage: .

setenv =
    # Unbuffered so the native glibc/teardown output is not reordered or lost when a process aborts.
    nifake-system_tests: PYTHONUNBUFFERED = 1
    # MALLOC_CHECK_=3: glibc heap corruption detection.
    # On RHEL 9 (glibc 2.34+), aborts with a backtrace on the first heap error,
    # giving a cleaner stack trace than a random SIGSEGV later.
    # Value 3 = print message + abort (2 = print only, 1 = abort only).
    nifake-system_tests: MALLOC_CHECK_=3
    # COREDUMP_FILTER=0xff: include all memory regions (anonymous, file-backed,
    # shared, hugetlb) in the core dump so the C++ vtable and heap state are
    # fully captured for post-mortem analysis with gdb.
    nifake-system_tests: COREDUMP_FILTER=0xff

commands =
    nifake-wheel_dep: python -m build --wheel

    # --disable-pip-version-check prevents pip from telling us we need to upgrade pip, since we are doing that now
    nifake-system_tests: python -m pip install --disable-pip-version-check --upgrade pip
    nifake-system_tests: python ../../tools/install_local_wheel.py --driver nitclk --start-path ../..
    nifake-system_tests: python -c "import nifake; nifake.print_diagnostic_information()"
    # -X faulthandler: dump Python tracebacks on fatal signals. python -v: trace interpreter finalization (# cleanup/# destroy) to see which module unload precedes a -6 abort. pytest -s: don't capture, so native teardown output is inline. -rA: full short test summary.
    nifake-system_tests: python -X faulthandler -v -m coverage run --rcfile=../../tools/coverage_system_tests.rc --source nifake --parallel-mode -m pytest ../../src/nifake/examples -s -rA --junitxml=../junit/junit-nifake-{envname}-examples-{env:BITNESS:64}.xml {posargs}
    nifake-system_tests: python -X faulthandler -v -m coverage run --rcfile=../../tools/coverage_system_tests.rc --source nifake --parallel-mode -m pytest ../../src/nifake/system_tests -c tox-system_tests.ini -s -rA --junitxml=../junit/junit-nifake-{envname}-{env:BITNESS:64}.xml --durations=5 {posargs}

    nifake-coverage: coverage combine --rcfile=../../tools/coverage_system_tests.rc ./
    # Create the report to upload
    nifake-coverage: coverage xml -i --rcfile=../../tools/coverage_system_tests.rc
    # Display the coverage results
    nifake-coverage: coverage report --rcfile=../../tools/coverage_system_tests.rc

deps =
    nifake-wheel_dep: build

    nifake-system_tests: pytest
    nifake-system_tests: coverage
    nifake-system_tests: numpy
    nifake-system_tests: hightime
    nifake-system_tests: fasteners
    nifake-system_tests: pytest-json
    nifake-system_tests: .[grpc]

    nifake-coverage: coverage

depends =
    nifake-coverage: py{310,311,312,313,314}-nifake-system_tests
    nifake-system_tests: py{310,311,312,313,314}-nifake-wheel_dep,

passenv =
    GIT_BRANCH
    GIT_COMMIT
    BUILD_URL
    BRANCH_NAME
    JENKINS_URL
    BUILD_NUMBER

[pytest]
addopts = --verbose
filterwarnings =
   error::pytest.PytestUnhandledThreadExceptionWarning
norecursedirs = .* build dist CVS _darcs {arch} *.egg venv
junit_suite_name = nimi-python
junit_family = xunit1
