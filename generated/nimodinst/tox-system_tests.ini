# Tox (http://tox.testrun.org/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox -c tox-system_tests.ini" from the driver directory. (generated/nimodinst)
[tox]
envlist = py{310,311,312,313,314}-nimodinst-system_tests, py314-nimodinst-coverage
skip_missing_interpreters=True
ignore_basepython_conflict=True
# We put the .tox directory outside of the Jenkins workspace so that it isn't wiped with the rest of the repo
toxworkdir = ../../../.tox

[testenv]
description =
    nimodinst-system_tests: Run nimodinst system tests (requires NI-ModInst runtime to be installed)
    nimodinst-coverage: Prepare coverage report for upload to codecov.io  # upload handled by GitHub Actions

changedir =
    nimodinst-system_tests: .
    nimodinst-coverage: .

setenv =
    # Unbuffered so the native glibc/teardown output is not reordered or lost when a process aborts.
    nimodinst-system_tests: PYTHONUNBUFFERED = 1
    # MALLOC_CHECK_=3: glibc heap corruption detection.
    # On RHEL 9 (glibc 2.34+), aborts with a backtrace on the first heap error,
    # giving a cleaner stack trace than a random SIGSEGV later.
    # Value 3 = print message + abort (2 = print only, 1 = abort only).
    nimodinst-system_tests: MALLOC_CHECK_=3

commands =
    # --disable-pip-version-check prevents pip from telling us we need to upgrade pip, since we are doing that now
    nimodinst-system_tests: python -m pip install --disable-pip-version-check --upgrade pip
    nimodinst-system_tests: python -c "import nimodinst; nimodinst.print_diagnostic_information()"
    # -X faulthandler: dump Python tracebacks on fatal signals. python -v: trace interpreter finalization (# cleanup/# destroy) to see which module unload precedes a -6 abort. pytest -s: don't capture, so native teardown output is inline. -rA: full short test summary.
    nimodinst-system_tests: python -X faulthandler -v -m coverage run --rcfile=../../tools/coverage_system_tests.rc --source nimodinst --parallel-mode -m pytest ../../src/nimodinst/examples -s -rA --junitxml=../junit/junit-nimodinst-{envname}-examples-{env:BITNESS:64}.xml {posargs}
    nimodinst-system_tests: python -X faulthandler -v -m coverage run --rcfile=../../tools/coverage_system_tests.rc --source nimodinst --parallel-mode -m pytest ../../src/nimodinst/system_tests -c tox-system_tests.ini -s -rA --junitxml=../junit/junit-nimodinst-{envname}-{env:BITNESS:64}.xml --durations=5 {posargs}

    nimodinst-coverage: coverage combine --rcfile=../../tools/coverage_system_tests.rc ./
    # Create the report to upload
    nimodinst-coverage: coverage xml -i --rcfile=../../tools/coverage_system_tests.rc
    # Display the coverage results
    nimodinst-coverage: coverage report --rcfile=../../tools/coverage_system_tests.rc

deps =
    nimodinst-system_tests: pytest
    nimodinst-system_tests: coverage
    nimodinst-system_tests: numpy
    nimodinst-system_tests: hightime
    nimodinst-system_tests: fasteners
    nimodinst-system_tests: pytest-json

    nimodinst-coverage: coverage

depends =
    nimodinst-coverage: py{310,311,312,313,314}-nimodinst-system_tests

passenv =
    GIT_BRANCH
    GIT_COMMIT
    BUILD_URL
    BRANCH_NAME
    JENKINS_URL
    BUILD_NUMBER

[pytest]
addopts = --verbose
filterwarnings =
   error::pytest.PytestUnhandledThreadExceptionWarning
norecursedirs = .* build dist CVS _darcs {arch} *.egg venv
junit_suite_name = nimi-python
junit_family = xunit1
