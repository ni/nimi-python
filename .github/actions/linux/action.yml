name: "Run system tests"
description: "Run system tests for the specified module"
inputs:
  module_name:
    description: "module name"
    required: true
    default: ""

runs:
  using: "composite"
  steps:
    - name: Configure core dumps
      run: |
        # Redirect core dumps to a writable directory before the tests run.
        # RHEL 9 default core_pattern pipes through systemd-coredump which
        # requires root to read back; writing directly to /tmp/cores avoids that.
        sudo mkdir -p /tmp/cores
        sudo chmod 1777 /tmp/cores
        echo "/tmp/cores/core.%e.%p.%t" | sudo tee /proc/sys/kernel/core_pattern
        echo "Core pattern set to: $(cat /proc/sys/kernel/core_pattern)"
      shell: bash
    - run: |
        source /etc/bashrc
        cd generated
        mkdir junit
        cd ${{ inputs.module_name }}
        # Unlimited core size for this shell and all child processes.
        # COREDUMP_FILTER=0xff: write all memory regions (anonymous + file-backed
        # + shared + hugetlb) so the full heap/vtable state is captured.
        ulimit -c unlimited
        export COREDUMP_FILTER=0xff
        python -m tox -c tox-system_tests.ini
      shell: bash
    - name: Collect core dumps
      if: always()
      run: |
        shopt -s nullglob
        cores=(/tmp/cores/core.python.*)
        if [ ${#cores[@]} -eq 0 ]; then
          echo "No core dumps found."
          exit 0
        fi
        echo "Core dump(s) found:"
        ls -lh "${cores[@]}"
        mkdir -p /tmp/core_artifacts
        for f in "${cores[@]}"; do
          echo "Compressing $f (gzip -6) ..."
          # -6 balances speed vs ratio; NI should gunzip before loading in gdb.
          gzip -6 -c "$f" > "/tmp/core_artifacts/$(basename "$f").gz"
        done
        ls -lh /tmp/core_artifacts/
      shell: bash
    - name: Upload core dumps
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: core-dumps-${{ inputs.module_name }}
        path: /tmp/core_artifacts/*.gz
        if-no-files-found: ignore
        retention-days: 14

