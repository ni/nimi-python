name: "Run system tests"
description: "Run system tests for the specified module"
inputs:
  module_name:
    description: "module name"
    required: true
    default: ""

runs:
  using: "composite"
  steps:
    - run: |
        # Do NOT override core_pattern — changing it shifts process exit timing
        # and can suppress the race condition we are trying to capture.
        # systemd-coredump on RHEL 9.6 captures dumps automatically; we just
        # need ulimit set in the same shell as the crashing process.
        ulimit -c unlimited
        echo "Core size limit: $(ulimit -c)"

        source /etc/bashrc
        cd generated
        mkdir junit
        cd ${{ inputs.module_name }}
        python -m tox -c tox-system_tests.ini
      shell: bash
    - name: Collect core dumps
      if: always()
      run: |
        mkdir -p /tmp/core_artifacts

        # Path 1: direct dump in CWD (ulimit triggered, systemd not intercepting)
        shopt -s nullglob
        cores=(/tmp/cores/core.python.* /tmp/cores/core.python3.* core.*)
        for f in "${cores[@]}"; do
          echo "Found direct core: $f ($(du -sh "$f" | cut -f1))"
          gzip -6 -c "$f" > "/tmp/core_artifacts/$(basename "$f").gz"
        done

        # Path 2: systemd-coredump captured it (most likely on RHEL 9.6)
        if command -v coredumpctl &>/dev/null; then
          mapfile -t entries < <(coredumpctl list --no-pager --since "-1h" 2>/dev/null \
            | grep python | awk '{print $5}')
          for pid in "${entries[@]}"; do
            out="/tmp/core_artifacts/core.python.coredumpctl.${pid}"
            echo "Exporting systemd-coredump entry PID $pid"
            coredumpctl dump "$pid" --output="$out" 2>/dev/null \
              && gzip -6 "$out" || true
          done
        fi

        ls -lh /tmp/core_artifacts/ 2>/dev/null || echo "No core artifacts collected."
      shell: bash
    - name: Upload core dumps
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: core-dumps-${{ inputs.module_name }}
        path: /tmp/core_artifacts/*.gz
        if-no-files-found: ignore
        retention-days: 14
